name: CI
on:
  pull_request:
  push:

jobs:
  lint:
    name: vala-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run vala-lint
        run: nix develop -c io.elementary.vala-lint

  build:
    name: meson build (devshell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup
        run: nix develop -c meson setup build
      - name: Build
        run: nix develop -c ninja -C build

  nix-build:
    name: nix build (flake package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build package
        run: nix build
      - name: Check flake
        run: nix flake check